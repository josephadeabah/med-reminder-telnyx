# Full local/demo stack: Postgres + FastAPI backend (+ optional Next.js frontend).
#
# Typical flow:
#   1. cp backend/.env.example backend/.env   and fill in Telnyx credentials
#   2. docker compose up --build              (postgres + backend; backend runs
#                                               `alembic upgrade head` + optional
#                                               seed on boot - see entrypoint.sh)
#   3. ngrok http 8000                        (on the HOST machine - tunnels straight
#                                               to the backend's published port)
#   4. paste the ngrok https URL into backend/.env as PUBLIC_BASE_URL, restart:
#        docker compose restart backend
#   5. cd frontend && npm run dev             (or: docker compose --profile frontend up)
#
# Using Supabase instead of the bundled Postgres? Set DATABASE_URL in
# backend/.env to your Supabase connection string and run `docker compose up backend`
# (delete the DATABASE_URL override below, or just don't run the `postgres` service).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: med_reminder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/med_reminder
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    profiles: ["frontend"]  # only starts with: docker compose --profile frontend up
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
